<h1 id="aname-record"><a aria-hidden="true" class="anchor-heading icon-link" href="#aname-record"></a>ANAME Record</h1>
<h3 id="aname"><a aria-hidden="true" class="anchor-heading icon-link" href="#aname"></a>ANAME</h3>
<ul>
<li>Like a <em>CNAME record</em>, but at the root of the domain</li>
<li>Allows us to point the "naked" version of domain (eg. example.com) to another host</li>
<li>Common use case is CDN</li>
</ul>
