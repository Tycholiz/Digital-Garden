<h1 id="show"><a aria-hidden="true" class="anchor-heading icon-link" href="#show"></a>Show</h1>
<h5 id="show-differences-introduced-by-a-commit"><a aria-hidden="true" class="anchor-heading icon-link" href="#show-differences-introduced-by-a-commit"></a>Show differences introduced by a commit</h5>
<p><code>git show &#x3C;SHA></code></p>
<h5 id="list-the-files-changed-in-a-commit"><a aria-hidden="true" class="anchor-heading icon-link" href="#list-the-files-changed-in-a-commit"></a>List the files changed in a commit</h5>
<p><code>git show &#x3C;SHA> --name-only</code></p>
