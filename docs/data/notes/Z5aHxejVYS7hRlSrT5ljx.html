<h4 id="reset-all-files-in-a-directory"><a aria-hidden="true" class="anchor-heading icon-link" href="#reset-all-files-in-a-directory"></a>Reset all files in a directory</h4>
<p><code>git restore --source=HEAD --staged --worktree -- modules/client-reader/colibrio</code></p>
<ul>
<li>restore all files in the <code>modules/client-reader/colibrio</code> to their HEAD version (in other words, unstage them)</li>
</ul>
