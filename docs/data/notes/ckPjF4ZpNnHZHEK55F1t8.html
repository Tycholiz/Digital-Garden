<h1 id="cook"><a aria-hidden="true" class="anchor-heading icon-link" href="#cook"></a>Cook</h1>
<h5 id="create-new-branch-from-given-commit"><a aria-hidden="true" class="anchor-heading icon-link" href="#create-new-branch-from-given-commit"></a>Create new branch from given commit</h5>
<p><code>git checkout -b new-branch a67de0</code></p>
<ul>
<li>Equivalent to checking out a commit, then creating a new branch</li>
</ul>
<p><code>git checkout -b new-branch HEAD~3</code></p>
<h5 id="stop-tracking-a-remote-branch"><a aria-hidden="true" class="anchor-heading icon-link" href="#stop-tracking-a-remote-branch"></a>Stop tracking a remote branch</h5>
<p><code>git branch --unset-upstream</code></p>
