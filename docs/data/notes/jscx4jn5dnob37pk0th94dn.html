<h1 id="env"><a aria-hidden="true" class="anchor-heading icon-link" href="#env"></a>Env</h1>
<p>Environment variables can be</p>
<ul>
<li><code>self</code> - defined within the same yml file</li>
<li><code>env</code> - defined within an <code>env</code> file</li>
<li><code>opt</code> - defined on CLI
<ul>
<li>ex. <code>sls invoke --stage="local" ...</code> can be accessed with <code>${opt:stage}</code></li>
</ul>
</li>
</ul>
