<h1 id="cli"><a aria-hidden="true" class="anchor-heading icon-link" href="#cli"></a>CLI</h1>
<h4 id="start-caddy-in-background"><a aria-hidden="true" class="anchor-heading icon-link" href="#start-caddy-in-background"></a>Start Caddy in background</h4>
<p><code>caddy start</code></p>
<h4 id="start-caddy-in-foreground"><a aria-hidden="true" class="anchor-heading icon-link" href="#start-caddy-in-foreground"></a>Start Caddy in foreground</h4>
<p><code>caddy run</code></p>
<h4 id="give-caddy-a-new-config-without-stopping-server"><a aria-hidden="true" class="anchor-heading icon-link" href="#give-caddy-a-new-config-without-stopping-server"></a>Give Caddy a new config without stopping server</h4>
<p><code>caddy reload</code>
note: this works with <code>caddy start</code>; not <code>run</code></p>
