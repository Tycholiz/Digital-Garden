<h1 id="cli"><a aria-hidden="true" class="anchor-heading icon-link" href="#cli"></a>CLI</h1>
<ul>
<li>Open redis-cli shell - <code>redis-cli</code></li>
<li>Get all keys - <code>keys *</code></li>
<li>Get the type of a particular key - <code>type &#x3C;key></code></li>
<li>Set new key to hold string value - <code>set &#x3C;key> &#x3C;value></code></li>
<li>Sets field in the hash stored at key to value - <code>set &#x3C;key> &#x3C;field> &#x3C;value></code></li>
</ul>
