<h1 id="folder-structure"><a aria-hidden="true" class="anchor-heading icon-link" href="#folder-structure"></a>Folder Structure</h1>
<p>Keep all of your components and related code in a src folder</p>
<p>The other folder at the top level should be public with static assets</p>
<p>Images that you are going to import inside of components should be in src, not public</p>
