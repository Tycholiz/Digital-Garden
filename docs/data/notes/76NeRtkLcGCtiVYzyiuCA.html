<h1 id="local-storage"><a aria-hidden="true" class="anchor-heading icon-link" href="#local-storage"></a>Local Storage</h1>
<p>anything inside local storage is accessible by any script inside your page. This is why storing JWTs in local storage is a bad idea, but storing app state would be fine.</p>
