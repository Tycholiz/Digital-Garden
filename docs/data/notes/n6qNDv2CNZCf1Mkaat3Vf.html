<h1 id="lambda-cli"><a aria-hidden="true" class="anchor-heading icon-link" href="#lambda-cli"></a>Lambda CLI</h1>
<h3 id="invoke-a-lambda"><a aria-hidden="true" class="anchor-heading icon-link" href="#invoke-a-lambda"></a>Invoke a Lambda</h3>
<pre class="language-sh"><code class="language-sh">aws lambda invoke \
	--function-name &#x3C;name/arn> \
	--payload '{ "name": "Bob" }' \
	--cli-binary-format raw-in-base64-out \
	# --invocation-type &#x3C;RequestResponse (sync) | Event (async)>
	response.json
</code></pre>
