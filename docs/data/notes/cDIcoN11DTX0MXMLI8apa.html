<h1 id="cli"><a aria-hidden="true" class="anchor-heading icon-link" href="#cli"></a>CLI</h1>
<h3 id="login"><a aria-hidden="true" class="anchor-heading icon-link" href="#login"></a>Login</h3>
<p><code>sanity login</code></p>
<h3 id="query-all-documents-by-type"><a aria-hidden="true" class="anchor-heading icon-link" href="#query-all-documents-by-type"></a>Query all documents by type</h3>
<p><code>sanity documents query "*[_type == 'song']"</code></p>
<h3 id="delete-document-by-id"><a aria-hidden="true" class="anchor-heading icon-link" href="#delete-document-by-id"></a>Delete document by ID</h3>
<p><code>sanity documents delete &#x3C;UUID></code></p>
<h3 id="get-bearer-token"><a aria-hidden="true" class="anchor-heading icon-link" href="#get-bearer-token"></a>Get Bearer Token</h3>
<p><code>sanity debug --secrets</code></p>
